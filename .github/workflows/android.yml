name: Android Quality Checks

on:
  pull_request:
    branches: [main]
    paths:
      - "android/**"

defaults:
  run:
    working-directory: android

jobs:
  quality:
    name: 코드 품질 검사 (Android)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('android/**/*.gradle*', 'android/**/libs.versions.toml') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Grant Gradlew permission
        run: chmod +x gradlew

      - name: "[1] detekt 정적 분석"
        run: ./gradlew detekt

      - name: "[2] ktlint 린터"
        run: ./gradlew ktlintCheck

      - name: "[3] Android Lint"
        run: ./gradlew :app:lint

      - name: "[4] 단위 테스트 + 커버리지 검증"
        run: ./gradlew testDebugUnitTest :app:jacocoTestCoverageVerification

      - name: "[5] 테스트 코드 비율 검사"
        run: ./gradlew :app:checkTestRatio

      - name: "[6] jscpd 설치"
        working-directory: ${{ github.workspace }}
        run: npm install -g jscpd@3

      - name: "[6] 중복 코드 검사"
        run: jscpd --config .jscpd.json

      - name: 커버리지 리포트 업로드 (실패 시에도)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reports
          path: |
            android/app/build/reports/detekt/
            android/app/build/reports/lint/
            android/app/build/reports/jacoco/
            android/domain/build/reports/detekt/
            android/data/build/reports/detekt/
            android/ocr/build/reports/detekt/
            android/ui/build/reports/detekt/
            android/analytics/build/reports/detekt/
          retention-days: 7
