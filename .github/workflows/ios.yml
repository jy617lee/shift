name: iOS Quality Checks

on:
  pull_request:
    branches: [main]
    paths:
      - "ios/**"
      - "test-fixtures/**"
      - ".github/workflows/ios.yml"

defaults:
  run:
    working-directory: ios

jobs:
  quality:
    name: 코드 품질 검사 (iOS)
    runs-on: macos-latest
    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Xcode 26.1 선택
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.1'

      - name: "[1] SwiftLint 정적 분析 + 린터"
        run: |
          if ! command -v swiftlint &>/dev/null; then
            brew install swiftlint
          fi
          swiftlint --strict

      # TODO: 단위 테스트 + 커버리지 — 시뮬레이터 의존성으로 건너뜀 (잔존 이슈)

      - name: jscpd 캐시 복원
        uses: actions/cache@v4
        with:
          path: ~/.npm-global
          key: npm-jscpd-${{ runner.os }}-v3

      - name: "[4] jscpd 설치"
        working-directory: ${{ github.workspace }}
        run: |
          npm config set prefix ~/.npm-global
          export PATH="$HOME/.npm-global/bin:$PATH"
          npm install -g jscpd@3
          echo "$HOME/.npm-global/bin" >> $GITHUB_PATH

      - name: "[5] 중복 코드 검사"
        run: jscpd --config .jscpd.json

