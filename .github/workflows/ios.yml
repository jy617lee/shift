name: iOS Quality Checks

on:
  pull_request:
    branches: [main]
    paths:
      - "ios/**"

defaults:
  run:
    working-directory: ios

jobs:
  quality:
    name: 코드 품질 검사 (iOS)
    runs-on: macos-latest
    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Xcode 26.1 선택
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.1'

      - name: Mint 캐시 복원
        uses: actions/cache@v4
        with:
          path: ~/.mint
          key: mint-${{ runner.os }}-${{ hashFiles('ios/Mintfile') }}
          restore-keys: mint-${{ runner.os }}-

      - name: "[1] SwiftLint 정적 분석 + 린터"
        run: |
          brew install mint
          mint bootstrap
          mint run swiftlint --strict

      - name: "[2] 단위 테스트 + 커버리지 수집"
        working-directory: ios/shift
        run: |
          xcodebuild test \
            -project shift.xcodeproj \
            -scheme shift \
            -destination 'platform=iOS Simulator,name=Any iOS Simulator Device' \
            -enableCodeCoverage YES \
            -derivedDataPath /tmp/DerivedData \
            -skip-testing:shiftUITests \
            -skip-testing:shiftUITestsLaunchTests \
            -quiet

      - name: "[3] 커버리지 검증 (기준: 30%)"
        run: |
          XCRESULT=$(find /tmp/DerivedData -name "*.xcresult" | head -1)
          bash scripts/check_coverage.sh "$XCRESULT" 30

      - name: "[4] 테스트 코드 비율 검사 (기준: 50%)"
        run: bash scripts/check_test_ratio.sh

      - name: jscpd 캐시 복원
        uses: actions/cache@v4
        with:
          path: ~/.npm-global
          key: npm-jscpd-${{ runner.os }}-v3

      - name: "[5] jscpd 설치"
        working-directory: ${{ github.workspace }}
        run: |
          npm config set prefix ~/.npm-global
          export PATH="$HOME/.npm-global/bin:$PATH"
          npm install -g jscpd@3
          echo "$HOME/.npm-global/bin" >> $GITHUB_PATH

      - name: "[6] 중복 코드 검사"
        run: jscpd --config .jscpd.json

      - name: 커버리지 리포트 업로드 (실패 시에도)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-reports
          path: /tmp/DerivedData/Logs/Test/
          retention-days: 7
