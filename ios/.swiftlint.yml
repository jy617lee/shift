included:
  - shift/shift

excluded:
  - shift/shiftTests
  - shift/shiftUITests
  - shift/shift.xcodeproj

# 위반 시 빌드 실패 (error) 처리
opt_in_rules:
  - force_unwrapping
  - force_cast
  - closure_spacing
  - collection_alignment
  - contains_over_filter_count
  - empty_count
  - explicit_init
  - fatal_error_message
  - first_where
  - implicitly_unwrapped_optional
  - last_where
  - legacy_multiple
  - modifier_order
  - nimble_operator
  - no_extension_access_modifier
  - operator_usage_whitespace
  - prefer_self_type_over_type_of_self
  - redundant_nil_coalescing
  - sorted_imports
  - toggle_bool
  - unneeded_parentheses_in_closure_argument
  - unowned_variable_capture
  - yoda_condition

disabled_rules:
  - todo
  - trailing_whitespace

# CLAUDE.md 명시 기준
force_unwrapping: error
force_cast: error

function_body_length:
  warning: 40
  error: 50

cyclomatic_complexity:
  warning: 15
  error: 20

line_length:
  warning: 120
  error: 150
  ignores_urls: true
  ignores_comments: true

type_body_length:
  warning: 250
  error: 350

file_length:
  warning: 400
  error: 500

identifier_name:
  min_length:
    warning: 2
  max_length:
    warning: 50
    error: 60

nesting:
  type_level:
    warning: 2
  function_level:
    warning: 3
